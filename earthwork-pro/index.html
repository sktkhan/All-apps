<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthwork Pro - Akhtar Surveyor</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #2ecc71; --dark-bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--dark-bg); color: var(--text); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; 
            padding-bottom: 70px; /* AdMob Banner ke liye jagah */
        }
        .app-container { width: 100%; max-width: 400px; padding: 25px; box-sizing: border-box; }
        h1 { font-size: 22px; color: var(--primary); text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        p.subtitle { text-align: center; color: #94a3b8; font-size: 13px; margin-top: 0; margin-bottom: 25px; }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 700; color: #cbd5e1; text-transform: uppercase; }
        
        input, select { 
            width: 100%; padding: 14px; border-radius: 10px; 
            border: 1px solid #334155; background: #0f172a; 
            color: #fff; font-size: 16px; font-weight: bold; 
            box-sizing: border-box; outline: none; transition: 0.3s; 
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(46, 204, 113, 0.2); }
        
        button { 
            width: 100%; padding: 16px; background: var(--primary); 
            color: white; border: none; border-radius: 10px; 
            font-size: 16px; font-weight: 800; cursor: pointer; 
            margin-top: 5px; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); 
        }
        
        .result-panel { 
            margin-top: 25px; padding: 20px; 
            background: rgba(46, 204, 113, 0.1); 
            border-radius: 12px; border: 1px solid var(--primary); 
            display: none; animation: fadeIn 0.4s ease; 
        }
        .res-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 16px; }
        .res-row b { color: var(--primary); font-size: 18px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* AdMob Banner Placement (Fixed Bottom) */
        .admob-banner-area { 
            position: fixed; bottom: 0; left: 0; 
            width: 100%; height: 50px; 
            background: #1e293b; border-top: 1px solid #334155; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 1000; 
        }
        .admob-text { color: #475569; font-size: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;}
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Earthwork Pro</h1>
        <p class="subtitle">Volume & Tonnage Calculator</p>

        <div class="input-group">
            <label>Length (L) - Meters</label>
            <input type="number" id="len" step="0.001" placeholder="e.g. 100.00">
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>Width (W) - m</label>
                <input type="number" id="wid" step="0.001" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Depth (D) - m</label>
                <input type="number" id="dep" step="0.001" placeholder="0.00">
            </div>
        </div>

        <div class="input-group">
            <label>Material Type (Density)</label>
            <select id="density">
                <option value="2.35">Asphalt (2.35 t/m³)</option>
                <option value="1.85">Sub-Base (1.85 t/m³)</option>
                <option value="1.60">Loose Soil (1.60 t/m³)</option>
                <option value="2.40">Concrete (2.40 t/m³)</option>
            </select>
        </div>

        <button onclick="calculateEarthwork()">Calculate Now</button>

        <div id="resPanel" class="result-panel">
            <div class="res-row"><span>Area:</span> <b id="area">0.00 m²</b></div>
            <div class="res-row"><span>Volume:</span> <b id="vol">0.000 m³</b></div>
            <div class="res-row" style="border-top: 1px solid #334155; padding-top:10px; margin-top:10px;">
                <span>Total Tonnage:</span> <b id="ton" style="color:#3498db;">0.00 Tons</b>
            </div>
        </div>
    </div>

    <!-- AdMob Banner Space Reserved -->
    <div class="admob-banner-area">
        <span class="admob-text">AdMob Banner Space Reserved</span>
    </div>

    <script>
        function calculateEarthwork() {
            const l = parseFloat(document.getElementById('len').value);
            const w = parseFloat(document.getElementById('wid').value);
            const d = parseFloat(document.getElementById('dep').value);
            const den = parseFloat(document.getElementById('density').value);

            if(isNaN(l) || isNaN(w) || isNaN(d)) {
                alert("Please fill all engineering values correctly!");
                return;
            }

            const area = l * w;
            const volume = area * d;
            const tonnage = volume * den;

            document.getElementById('area').innerText = area.toFixed(2) + " m²";
            document.getElementById('vol').innerText = volume.toFixed(3) + " m³";
            document.getElementById('ton').innerText = tonnage.toFixed(2) + " Tons";
            document.getElementById('resPanel').style.display = 'block';
            
            console.log("Earthwork calculation complete. Interstitial Ad ready.");
        }

        if ('serviceWorker' in navigator) { 
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js'); 
            });
        }
    </script>
</body>
</html>
