<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthwork Pro - Akhtar Surveyor</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #2ecc71; --accent: #3498db; --dark-bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--dark-bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 500px; background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-size: 24px; color: var(--primary); text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        p.subtitle { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 25px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: var(--primary); font-size: 16px; font-weight: 700; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }
        button { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary), #27ae60); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3); }
        .result-panel { margin-top: 25px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 15px; border: 1px solid var(--primary); display: none; animation: fadeIn 0.5s ease; }
        .res-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 16px; }
        .res-row b { color: var(--primary); font-size: 18px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ad-box { margin-top: 20px; min-height: 100px; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Earthwork Pro</h1>
        <p class="subtitle">Precision Volume & Tonnage Calculator</p>

        <div class="input-group">
            <label>Length (L) meters</label>
            <input type="number" id="len" step="0.001" placeholder="0.000">
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>Width (W) m</label>
                <input type="number" id="wid" step="0.001" placeholder="0.000">
            </div>
            <div class="input-group">
                <label>Mean Depth (D) m</label>
                <input type="number" id="dep" step="0.001" placeholder="0.000">
            </div>
        </div>

        <div class="input-group">
            <label>Material Type (Density)</label>
            <select id="density">
                <option value="2.35">Asphalt (2.35 t/m³)</option>
                <option value="1.85">Sub-Base (1.85 t/m³)</option>
                <option value="1.60">Loose Soil (1.60 t/m³)</option>
                <option value="2.40">Concrete (2.40 t/m³)</option>
            </select>
        </div>

        <button onclick="calculate()">Calculate Now</button>

        <div id="resPanel" class="result-panel">
            <div class="res-row"><span>Total Area:</span> <b id="area">0.00</b> m²</div>
            <div class="res-row"><span>Total Volume:</span> <b id="vol">0.00</b> m³</div>
            <div class="res-row" style="border-top: 1px solid #334155; padding-top:10px;">
                <span>Total Tonnage:</span> <b id="ton" style="color:#3498db;">0.00 Tons</b>
            </div>
        </div>
    </div>

    <!-- Adsterra Ad Slot -->
    <div class="ad-box">
        <script>atOptions = {'key':'fa085f009e658d4fed5c43ee4051065b','format':'iframe','height':250,'width':300,'params':{}};</script>
        <script src="https://www.highperformanceformat.com/fa085f009e658d4fed5c43ee4051065b/invoke.js"></script>
    </div>

    <script>
        function calculate() {
            const l = parseFloat(document.getElementById('len').value);
            const w = parseFloat(document.getElementById('wid').value);
            const d = parseFloat(document.getElementById('dep').value);
            const den = parseFloat(document.getElementById('density').value);

            if(l && w && d) {
                const area = l * w;
                const volume = area * d;
                const tonnage = volume * den;

                document.getElementById('area').innerText = area.toFixed(2);
                document.getElementById('vol').innerText = volume.toFixed(3);
                document.getElementById('ton').innerText = tonnage.toFixed(2) + " Tons";
                document.getElementById('resPanel').style.display = 'block';
            } else {
                alert("Please fill all engineering values!");
            }
        }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
