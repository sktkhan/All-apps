<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sewerage Slope Pro - Akhtar Surveyor</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #3498db; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; 
            /* Banner ad ke liye niche 60px ki jagah chhori gayi hai */
            padding-bottom: 60px; 
        }
        .container { width: 100%; max-width: 400px; padding: 25px; box-sizing: border-box; }
        h1 { color: var(--primary); text-align: center; font-size: 24px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
        p.sub { text-align: center; color: #94a3b8; font-size: 13px; margin-top: 0; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }
        input { 
            width: 100%; padding: 14px; border-radius: 10px; 
            border: 1px solid #334155; background: #0f172a; 
            color: #fff; font-size: 16px; font-weight: bold; 
            box-sizing: border-box; outline: none; transition: 0.3s; 
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(52, 152, 219, 0.2); }
        
        button { 
            width: 100%; padding: 16px; background: var(--primary); 
            color: #fff; border: none; border-radius: 10px; 
            font-size: 16px; font-weight: 800; cursor: pointer; 
            margin-top: 10px; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        
        .result-box { 
            margin-top: 25px; padding: 20px; 
            background: rgba(52, 152, 219, 0.1); 
            border: 1px solid var(--primary); border-radius: 12px; 
            display: none; 
        }
        .res-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 16px; }
        .res-row b { color: var(--primary); font-size: 18px;}

        /* AdMob Banner Placement (Fixed Bottom - Play Store Policy Compliant) */
        .admob-banner-area { 
            position: fixed; bottom: 0; left: 0; 
            width: 100%; height: 50px; 
            background: #1e293b; border-top: 1px solid #334155; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 1000; 
        }
        .admob-text { color: #475569; font-size: 11px; text-transform: uppercase; font-weight: bold;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Sewerage Pro</h1>
        <p class="sub">Precision Pipe Slope & RL Calculator</p>

        <div class="input-group">
            <label>Starting RL (Reduced Level) - m</label>
            <input type="number" id="startRl" step="0.001" placeholder="e.g. 100.000">
        </div>
        <div class="input-group">
            <label>Pipe Length / Distance - m</label>
            <input type="number" id="distance" step="0.001" placeholder="e.g. 50">
        </div>
        <div class="input-group">
            <label>Slope / Gradient (1 in X)</label>
            <input type="number" id="slope" step="0.001" placeholder="e.g. 200">
        </div>

        <button onclick="calculateSlope()">Calculate Fall & End RL</button>

        <div id="result" class="result-box">
            <div class="res-row"><span>Total Fall:</span> <b id="fallVal">0.000 m</b></div>
            <div class="res-row" style="border-top: 1px solid #334155; padding-top: 10px; margin-top: 10px;">
                <span>End Invert Level:</span> <b id="endRlVal">0.000</b>
            </div>
        </div>
    </div>

    <!-- This space is strictly reserved for the AdMob Banner in Native Code -->
    <!-- It will never overlap with the calculate button or input fields -->
    <div class="admob-banner-area">
        <span class="admob-text">AdMob Banner Space Reserved</span>
    </div>

    <script>
        function calculateSlope() {
            const startRl = parseFloat(document.getElementById('startRl').value);
            const distance = parseFloat(document.getElementById('distance').value);
            const slope = parseFloat(document.getElementById('slope').value);

            // Error validation
            if(isNaN(startRl) || isNaN(distance) || isNaN(slope) || slope === 0) {
                alert("Please enter correct engineering values.");
                return;
            }

            // Core Surveying Logic
            const fall = distance / slope;
            const endRl = startRl - fall;

            // Display Results
            document.getElementById('fallVal').innerText = fall.toFixed(3) + " m";
            document.getElementById('endRlVal').innerText = endRl.toFixed(3);
            document.getElementById('result').style.display = 'block';

            // Interstitial Ad Trigger Placeholder
            // Google Policy: Interstitials should only load between natural pauses or after a user action is fully completed.
            console.log("Action complete. Native Interstitial Ad can be triggered here with a frequency capping cooldown.");
        }

        // Service Worker for Offline PWA Support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
