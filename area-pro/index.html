<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area by Coordinate Pro - Akhtar Surveyor</title>
    
    <script src="https://sdk.start.io/v1/startio.js" async></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 15px;
            text-align: center;
        }
        .header {
            background-color: #008cba;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-bottom: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th { background-color: #eee; }
        input {
            width: 90%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn {
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-add { background-color: #4CAF50; color: white; }
        .btn-calc { background-color: #008cba; color: white; }
        .btn-reset { background-color: #f44336; color: white; }
        
        #result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border: 2px solid #008cba;
            border-radius: 8px;
            display: none;
            text-align: left;
        }

        /* Ad Placement */
        #startio-banner {
            width: 100%;
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">Area by Coordinate</h2>
    <small>SHIBH AL JAZIRA CONTRACTING COMPANY</small>
</div>

<table id="coordTable">
    <thead>
        <tr>
            <th>Pt.</th>
            <th>Easting (X)</th>
            <th>Northing (Y)</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>1</td>
            <td><input type="number" step="any" class="east"></td>
            <td><input type="number" step="any" class="north"></td>
        </tr>
        <tr>
            <td>2</td>
            <td><input type="number" step="any" class="east"></td>
            <td><input type="number" step="any" class="north"></td>
        </tr>
        <tr>
            <td>3</td>
            <td><input type="number" step="any" class="east"></td>
            <td><input type="number" step="any" class="north"></td>
        </tr>
    </tbody>
</table>

<button class="btn btn-add" onclick="addRow()">+ Add Point</button>
<button class="btn btn-calc" onclick="calculateArea()">Calculate Area</button>
<button class="btn btn-reset" onclick="location.reload()">Reset</button>

<div id="result"></div>

<div id="startio-banner"></div>

<footer>
    <p style="color:#888; font-size:12px;">Developed by: Akhtar Surveyor</p>
</footer>

<script>
    // Start.io ID: 204621622
    window.startio = window.startio || [];

    // Auto-load Banner
    window.onload = function() {
        window.startio.push({
            type: 'banner',
            container: 'startio-banner',
            appId: '204621622'
        });
    };

    function addRow() {
        var table = document.getElementById("coordTable").getElementsByTagName('tbody')[0];
        var rowCount = table.rows.length;
        var row = table.insertRow(rowCount);
        row.innerHTML = `<td>${rowCount + 1}</td>
                         <td><input type="number" step="any" class="east"></td>
                         <td><input type="number" step="any" class="north"></td>`;
    }

    function calculateArea() {
        // Trigger Full Screen Ad
        if (window.startio) {
            window.startio.push({
                type: 'interstitial',
                appId: '204621622'
            });
        }

        var easts = document.getElementsByClassName("east");
        var norths = document.getElementsByClassName("north");
        var n = easts.length;
        var area = 0;
        var x = [], y = [];

        for (var i = 0; i < n; i++) {
            if (easts[i].value !== "" && norths[i].value !== "") {
                x.push(parseFloat(easts[i].value));
                y.push(parseFloat(norths[i].value));
            }
        }

        if (x.length < 3) {
            alert("Minimum 3 coordinates zaroori hain!");
            return;
        }

        // Shoelace Formula
        var j = x.length - 1;
        for (var i = 0; i < x.length; i++) {
            area += (x[j] + x[i]) * (y[j] - y[i]);
            j = i;
        }
        area = Math.abs(area / 2.0);

        var resDiv = document.getElementById("result");
        resDiv.style.display = "block";
        resDiv.innerHTML = `
            <strong>Calculation Results:</strong><br><br>
            Total Area: <b>${area.toFixed(3)}</b> Sq. Meters<br>
            Total Area: <b>${(area / 10000).toFixed(4)}</b> Hectares<br>
            Total Area: <b>${(area * 10.7639).toFixed(2)}</b> Sq. Feet
        `;
    }
</script>

</body>
</html>
