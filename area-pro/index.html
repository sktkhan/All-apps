<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area by Coordinate Pro - Akhtar Surveyor</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #00bcd4; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --danger: #e74c3c; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding-bottom: 70px; 
        }
        .container { width: 100%; max-width: 450px; padding: 25px; box-sizing: border-box; }
        h1 { color: var(--primary); text-align: center; font-size: 22px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        p.sub { text-align: center; color: #94a3b8; font-size: 13px; margin-top: 0; margin-bottom: 20px; }
        
        .points-container { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 15px; }
        
        .coord-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .point-label { font-size: 12px; font-weight: bold; color: var(--primary); width: 30px; text-align: center; }
        input { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; 
            background: #0f172a; color: #fff; font-size: 14px; font-weight: bold; box-sizing: border-box; 
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(0, 188, 212, 0.2); }
        
        .btn-remove { 
            background: rgba(231, 76, 60, 0.1); color: var(--danger); border: 1px solid var(--danger);
            border-radius: 8px; padding: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-remove:hover { background: var(--danger); color: #fff; }

        .btn-add { 
            width: 100%; padding: 12px; background: transparent; color: var(--primary); 
            border: 2px dashed var(--primary); border-radius: 10px; font-size: 14px; font-weight: bold; 
            cursor: pointer; margin-bottom: 15px; transition: 0.3s;
        }
        .btn-add:hover { background: rgba(0, 188, 212, 0.1); }

        .btn-calc { 
            width: 100%; padding: 16px; background: var(--primary); color: #000; 
            border: none; border-radius: 10px; font-size: 16px; font-weight: 900; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3); text-transform: uppercase;
        }
        
        .result-box { 
            margin-top: 25px; padding: 20px; background: rgba(0, 188, 212, 0.1); 
            border: 1px solid var(--primary); border-radius: 12px; display: none; 
            animation: fadeIn 0.4s ease; text-align: center;
        }
        .result-box h3 { margin: 0; font-size: 14px; color: #cbd5e1; text-transform: uppercase; }
        .result-box .val { font-size: 28px; color: var(--primary); font-weight: 900; margin-top: 5px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* AdMob Banner Safe Zone */
        .admob-banner-area { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; 
            background: #1e293b; border-top: 1px solid #334155; display: flex; 
            justify-content: center; align-items: center; z-index: 1000; 
        }
        .admob-text { color: #475569; font-size: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coordinate Area</h1>
        <p class="sub">Easting & Northing Polygon Method</p>

        <button class="btn-add" onclick="addPoint()">+ Add New Point</button>

        <div class="points-container" id="pointList">
            <!-- Point 1 -->
            <div class="coord-row">
                <span class="point-label">P1</span>
                <input type="number" class="x-coord" step="0.001" placeholder="Easting (X)">
                <input type="number" class="y-coord" step="0.001" placeholder="Northing (Y)">
                <button class="btn-remove" onclick="removePoint(this)">X</button>
            </div>
            <!-- Point 2 -->
            <div class="coord-row">
                <span class="point-label">P2</span>
                <input type="number" class="x-coord" step="0.001" placeholder="Easting (X)">
                <input type="number" class="y-coord" step="0.001" placeholder="Northing (Y)">
                <button class="btn-remove" onclick="removePoint(this)">X</button>
            </div>
            <!-- Point 3 -->
            <div class="coord-row">
                <span class="point-label">P3</span>
                <input type="number" class="x-coord" step="0.001" placeholder="Easting (X)">
                <input type="number" class="y-coord" step="0.001" placeholder="Northing (Y)">
                <button class="btn-remove" onclick="removePoint(this)">X</button>
            </div>
        </div>

        <button class="btn-calc" onclick="calculateCoordinateArea()">Calculate Area</button>

        <div id="result" class="result-box">
            <h3>Total Enclosed Area</h3>
            <div class="val" id="areaVal">0.000 m²</div>
        </div>
    </div>

    <!-- AdMob Banner Safe Zone -->
    <div class="admob-banner-area">
        <span class="admob-text">AdMob Banner Space Reserved</span>
    </div>

    <script>
        let pointCount = 3;

        function addPoint() {
            pointCount++;
            const list = document.getElementById('pointList');
            const row = document.createElement('div');
            row.className = 'coord-row';
            row.innerHTML = `
                <span class="point-label">P${pointCount}</span>
                <input type="number" class="x-coord" step="0.001" placeholder="Easting (X)">
                <input type="number" class="y-coord" step="0.001" placeholder="Northing (Y)">
                <button class="btn-remove" onclick="removePoint(this)">X</button>
            `;
            list.appendChild(row);
            updateLabels();
        }

        function removePoint(btn) {
            const list = document.getElementById('pointList');
            if(list.children.length <= 3) {
                alert("Minimum 3 points are required to form an area!");
                return;
            }
            btn.parentElement.remove();
            updateLabels();
        }

        function updateLabels() {
            const rows = document.querySelectorAll('.coord-row');
            rows.forEach((row, index) => {
                row.querySelector('.point-label').innerText = 'P' + (index + 1);
            });
            pointCount = rows.length;
        }

        function calculateCoordinateArea() {
            const xInputs = document.querySelectorAll('.x-coord');
            const yInputs = document.querySelectorAll('.y-coord');
            let x = [], y = [];

            for(let i = 0; i < xInputs.length; i++) {
                let xv = parseFloat(xInputs[i].value);
                let yv = parseFloat(yInputs[i].value);
                
                if(isNaN(xv) || isNaN(yv)) {
                    alert("Please fill all Easting and Northing values correctly!");
                    return;
                }
                x.push(xv);
                y.push(yv);
            }

            // Shoelace Formula Calculation
            let area = 0;
            let j = x.length - 1;
            for (let i = 0; i < x.length; i++) {
                area += (x[j] + x[i]) * (y[j] - y[i]);
                j = i;
            }
            area = Math.abs(area / 2.0);

            document.getElementById('areaVal').innerText = area.toFixed(3) + " m²";
            document.getElementById('result').style.display = 'block';
            
            console.log("Coordinate Area calculation complete. Interstitial Ad ready.");
        }

        if ('serviceWorker' in navigator) { 
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js'); 
            });
        }
    </script>
</body>
</html>
