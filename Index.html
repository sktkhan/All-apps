<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngTool Pro - Survey Solutions</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a2634; color: white; margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: #2c3e50; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { color: #3498db; font-size: 24px; }
        .ad-box { margin: 15px 0; min-height: 50px; background: rgba(255,255,255,0.05); }
        .input-group { margin: 10px 0; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #bdc3c7; }
        input { width: 100%; padding: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .result { margin-top: 20px; padding: 15px; background: #000; border-radius: 5px; color: #2ecc71; font-size: 18px; }
    </style>
</head>
<body>

    <!-- Top Adsterra Container -->
    <div class="ad-box">
        <script async="async" data-cfasync="false" src="https://pl29290297.profitablecpmratenetwork.com/b706819116652b2e7fd7e161cbe6f7be/invoke.js"></script>
        <div id="container-b706819116652b2e7fd7e161cbe6f7be"></div>
    </div>

    <div class="container">
        <h1>Earthwork & Asphalt Pro</h1>
        
        <div class="input-group">
            <label>Length (m)</label>
            <input type="number" id="length" placeholder="Enter length">
        </div>
        <div class="input-group">
            <label>Width (m)</label>
            <input type="number" id="width" placeholder="Enter width">
        </div>
        <div class="input-group">
            <label>Thickness/Mean Depth (m)</label>
            <input type="number" id="depth" placeholder="Enter depth (e.g. 0.05 for 5cm)">
        </div>

        <button onclick="calculate()">Calculate Now</button>

        <div id="resultBox" class="result" style="display:none;"></div>

        <!-- Mid Adsterra Rectangle -->
        <div class="ad-box">
            <script>
                atOptions = { 'key' : 'fa085f009e658d4fed5c43ee4051065b', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
            </script>
            <script src="https://www.highperformanceformat.com/fa085f009e658d4fed5c43ee4051065b/invoke.js"></script>
        </div>
    </div>

    <!-- Footer Adsterra Leaderboard -->
    <div class="ad-box" style="margin-top:20px;">
        <script>
            atOptions = { 'key' : 'b639695771c7939b8fffd4a6dff9998d', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
        </script>
        <script src="https://www.highperformanceformat.com/b639695771c7939b8fffd4a6dff9998d/invoke.js"></script>
    </div>

    <script>
        function calculate() {
            let l = document.getElementById('length').value;
            let w = document.getElementById('width').value;
            let d = document.getElementById('depth').value;
            
            if(l && w && d) {
                let vol = l * w * d;
                let asphalt = vol * 2.35; // Standard density
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('resultBox').innerHTML = `
                    Volume: ${vol.toFixed(3)} m³ <br>
                    Asphalt Tonnage: ${asphalt.toFixed(2)} Tons
                `;
            } else {
                alert("Please fill all fields");
            }
        }
        
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
