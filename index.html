<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Earthwork & Asphalt Volume Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#283593">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #121212;
            --secondary-bg: #1e1e1e;
            --primary-text: #ffffff;
            --accent-color: #3949ab; /* Engineering Blue */
            --input-bg: #2c2c2c;
            --border-color: #424242;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--primary-bg);
            color: var(--primary-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header, main, footer {
            width: 100%;
            max-width: 800px;
            padding: 15px;
            box-sizing: border-box;
        }
        header {
            background-color: var(--secondary-bg);
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
        }
        h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 1.8em;
        }
        .ad-container {
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background-color: var(--secondary-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        h2 {
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-top: 0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--primary-text);
            border-radius: 4px;
            font-size: 1em;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: var(--primary-text);
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #4e5dbe;
        }
        .result {
            margin-top: 20px;
            background-color: var(--primary-bg);
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            font-size: 1.2em;
            font-weight: 500;
        }
        .result span {
            color: var(--accent-color);
            font-weight: 700;
        }
        footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 0.9em;
            color: #aaa;
        }
    </style>
</head>
<body>

    <header>
        <h1>Advanced Earthwork & Asphalt Volume Pro</h1>
        <div class="ad-container" id="ad-top">
            <script async="async" data-cfasync="false" src="https://pl29290297.profitablecpmratenetwork.com/b706819116652b2e7fd7e161cbe6f7be/invoke.js"></script>
            <div id="container-b706819116652b2e7fd7e161cbe6f7be"></div>
        </div>
    </header>

    <main>
        <!-- Earthwork Calculator -->
        <div class="card">
            <h2>Excavation/Filling Volume</h2>
            <div class="input-group">
                <label for="length">Length (m)</label>
                <input type="number" id="length" placeholder="e.g., 50">
            </div>
            <div class="input-group">
                <label for="width">Width (m)</label>
                <input type="number" id="width" placeholder="e.g., 10">
            </div>
            <div class="input-group">
                <label for="startDepth">Start Depth (m)</label>
                <input type="number" id="startDepth" placeholder="e.g., 1.5">
            </div>
            <div class="input-group">
                <label for="endDepth">End Depth (m)</label>
                <input type="number" id="endDepth" placeholder="e.g., 2.0">
            </div>
            <button onclick="calculateEarthwork()">Calculate Volume</button>
            <div class="result" id="earthworkResult">Volume: <span>- m³</span></div>
        </div>

        <!-- Adsterra Mid Ad -->
        <div class="ad-container" id="ad-mid">
            <script>atOptions = {'key' : 'fa085f009e658d4fed5c43ee4051065b','format' : 'iframe','height' : 250,'width' : 300,'params' : {}};</script>
            <script src="https://www.highperformanceformat.com/fa085f009e658d4fed5c43ee4051065b/invoke.js"></script>
        </div>

        <!-- Asphalt Calculator -->
        <div class="card">
            <h2>Asphalt Tonnage</h2>
            <div class="input-group">
                <label for="area">Area (m²)</label>
                <input type="number" id="area" placeholder="e.g., 1000">
            </div>
            <div class="input-group">
                <label for="thickness">Thickness (cm)</label>
                <input type="number" id="thickness" placeholder="e.g., 5">
            </div>
            <button onclick="calculateAsphalt()">Calculate Tonnage</button>
            <div class="result" id="asphaltResult">Tonnage: <span>- tonnes</span></div>
        </div>
    </main>

    <footer>
        <div class="ad-container" id="ad-footer">
            <script>atOptions = {'key' : 'b639695771c7939b8fffd4a6dff9998d','format' : 'iframe','height' : 90,'width' : 728,'params' : {}};</script>
            <script src="https://www.highperformanceformat.com/b639695771c7939b8fffd4a6dff9998d/invoke.js"></script>
        </div>
        <p>&copy; 2024 Survey Engineer Pro Apps</p>
    </footer>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered.', reg))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }

        // --- Calculation Logic ---

        function calculateEarthwork() {
            const length = parseFloat(document.getElementById('length').value);
            const width = parseFloat(document.getElementById('width').value);
            const startDepth = parseFloat(document.getElementById('startDepth').value);
            const endDepth = parseFloat(document.getElementById('endDepth').value);

            if (isNaN(length) || isNaN(width) || isNaN(startDepth) || isNaN(endDepth)) {
                alert("Please enter valid numbers for all earthwork fields.");
                return;
            }

            const meanDepth = (startDepth + endDepth) / 2;
            const volume = length * width * meanDepth;

            document.getElementById('earthworkResult').innerHTML = `Volume: <span>${volume.toFixed(3)} m³</span>`;
        }

        function calculateAsphalt() {
            const area = parseFloat(document.getElementById('area').value);
            const thickness = parseFloat(document.getElementById('thickness').value);
            const DENSITY = 2.375; // Average density in t/m³

            if (isNaN(area) || isNaN(thickness)) {
                alert("Please enter valid numbers for all asphalt fields.");
                return;
            }

            const thicknessInMeters = thickness / 100;
            const volume = area * thicknessInMeters;
            const tonnage = volume * DENSITY;

            document.getElementById('asphaltResult').innerHTML = `Tonnage: <span>${tonnage.toFixed(3)} tonnes</span>`;
        }
    </script>
</body>
</html>
