<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Cross-Slope Pro - Akhtar Surveyor</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #e67e22; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; 
            padding-bottom: 70px; 
        }
        .container { width: 100%; max-width: 400px; padding: 25px; box-sizing: border-box; }
        h1 { color: var(--primary); text-align: center; font-size: 22px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
        p.sub { text-align: center; color: #94a3b8; font-size: 13px; margin-top: 0; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }
        input { 
            width: 100%; padding: 14px; border-radius: 10px; 
            border: 1px solid #334155; background: #0f172a; 
            color: #fff; font-size: 16px; font-weight: bold; 
            box-sizing: border-box; outline: none; transition: 0.3s; 
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(230, 126, 34, 0.2); }
        
        button { 
            width: 100%; padding: 16px; background: var(--primary); 
            color: #fff; border: none; border-radius: 10px; 
            font-size: 16px; font-weight: 800; cursor: pointer; 
            margin-top: 10px; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3);
        }
        
        .result-box { 
            margin-top: 25px; padding: 20px; 
            background: rgba(230, 126, 34, 0.1); 
            border: 1px solid var(--primary); border-radius: 12px; 
            display: none; animation: slideUp 0.4s ease;
        }
        .res-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 16px; }
        .res-row b { color: var(--primary); font-size: 18px;}
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* AdMob Banner Area */
        .admob-banner-area { 
            position: fixed; bottom: 0; left: 0; 
            width: 100%; height: 50px; 
            background: #1e293b; border-top: 1px solid #334155; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 1000; 
        }
        .admob-text { color: #475569; font-size: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Road Cross-Slope Pro</h1>
        <p class="sub">Camber & Leveling Calculator</p>

        <div class="input-group">
            <label>Center Line RL (m)</label>
            <input type="number" id="centerRl" step="0.001" placeholder="e.g. 550.125">
        </div>
        <div class="input-group">
            <label>Road Width (one side) - m</label>
            <input type="number" id="width" step="0.001" placeholder="e.g. 3.65">
        </div>
        <div class="input-group">
            <label>Cross Slope / Camber (%)</label>
            <input type="number" id="percentage" step="0.01" placeholder="e.g. 2.5">
        </div>

        <button onclick="calculateRoad()">Calculate Edge RL</button>

        <div id="result" class="result-box">
            <div class="res-row"><span>Difference (Fall):</span> <b id="diffVal">0.000 m</b></div>
            <div class="res-row" style="border-top: 1px solid #334155; padding-top: 10px; margin-top: 10px;">
                <span>Edge RL:</span> <b id="edgeRlVal">0.000</b>
            </div>
        </div>
    </div>

    <!-- Reserved for AdMob Banner -->
    <div class="admob-banner-area">
        <span class="admob-text">AdMob Banner Space Reserved</span>
    </div>

    <script>
        function calculateRoad() {
            const centerRl = parseFloat(document.getElementById('centerRl').value);
            const width = parseFloat(document.getElementById('width').value);
            const percentage = parseFloat(document.getElementById('percentage').value);

            if(isNaN(centerRl) || isNaN(width) || isNaN(percentage)) {
                alert("Please enter all road engineering data.");
                return;
            }

            // Road Logic: Fall = (Width * Percentage) / 100
            const fall = (width * percentage) / 100;
            const edgeRl = centerRl - fall;

            document.getElementById('diffVal').innerText = fall.toFixed(3) + " m";
            document.getElementById('edgeRlVal').innerText = edgeRl.toFixed(3);
            document.getElementById('result').style.display = 'block';
            
            console.log("Road calculation complete. Interstitial Ad ready.");
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
