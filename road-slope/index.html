<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Slope Pro - Akhtar Surveyor</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #e67e22; --success: #27ae60; --dark: #1a2634; --card: #2c3e50; --text: #ecf0f1; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: var(--card); width: 100%; max-width: 480px; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border: 1px solid #34495e; box-sizing: border-box; }
        h1 { color: var(--primary); font-size: 20px; margin-bottom: 20px; text-transform: uppercase; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #bdc3c7; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #34495e; background: #1a2634; color: #f1c40f; font-size: 16px; font-weight: bold; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .result-area { margin-top: 20px; padding: 15px; background: #000; border-radius: 10px; border-left: 5px solid var(--primary); display: none; text-align: left; }
        .result-item { margin: 8px 0; font-size: 17px; display: flex; justify-content: space-between; }
        .ad-slot { margin: 15px 0; width: 100%; min-height: 50px; text-align: center; }
    </style>
</head>
<body>

    <div class="ad-slot">
        <script async="async" data-cfasync="false" src="https://pl29290297.profitablecpmratenetwork.com/b706819116652b2e7fd7e161cbe6f7be/invoke.js"></script>
        <div id="container-b706819116652b2e7fd7e161cbe6f7be"></div>
    </div>

    <div class="app-card">
        <h1>Road Cross-Slope Pro</h1>
        
        <div class="input-group">
            <label>Center Line RL (m)</label>
            <input type="number" id="clRL" step="0.001" placeholder="0.000">
        </div>
        <div class="input-group">
            <label>Width / Offset (m)</label>
            <input type="number" id="width" step="0.001" placeholder="Distance from Center">
        </div>
        <div class="input-group">
            <label>Cross Slope (%) - Use minus for fall</label>
            <input type="number" id="slope" step="0.001" placeholder="e.g. -2.5">
        </div>

        <button onclick="calculateRoad()">Calculate Offset RL</button>

        <div id="resultBox" class="result-area">
            <div class="result-item"><span>Level Difference:</span> <strong id="diffVal">0.000</strong></div>
            <hr style="border: 0.5px solid #333;">
            <div class="result-item"><span>Offset RL:</span> <strong id="offRLVal" style="color:#f1c40f;">0.000</strong></div>
        </div>

        <div class="ad-slot" style="margin-top:20px;">
            <script>atOptions = {'key':'fa085f009e658d4fed5c43ee4051065b','format':'iframe','height':250,'width':300,'params':{}};</script>
            <script src="https://www.highperformanceformat.com/fa085f009e658d4fed5c43ee4051065b/invoke.js"></script>
        </div>
    </div>

    <script>
        function calculateRoad() {
            const cl = parseFloat(document.getElementById('clRL').value);
            const w = parseFloat(document.getElementById('width').value);
            const s = parseFloat(document.getElementById('slope').value);

            if (!isNaN(cl) && !isNaN(w) && !isNaN(s)) {
                // Formula: Level Diff = Width * (Slope / 100)
                const diff = w * (s / 100);
                const finalRL = cl + diff;

                document.getElementById('diffVal').innerText = diff.toFixed(3) + " m";
                document.getElementById('offRLVal').innerText = finalRL.toFixed(3) + " m";
                document.getElementById('resultBox').style.display = 'block';
            } else {
                alert("Please enter valid data.");
            }
        }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
